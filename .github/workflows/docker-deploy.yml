name: Multi Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image (client)
        run: |
          docker build -t himesh2247/react-test -f ./client/Dockerfile.dev ./client

      - name: Run tests
        run: |
          docker run -e CI=true himesh2247/react-test npm test

      - name: Build production images
        run: |
          docker build -t himesh2247/multi-client ./client
          docker build -t himesh2247/multi-server ./server
          docker build -t himesh2247/multi-worker ./worker

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ID }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push images to Docker Hub
        run: |
          docker push himesh2247/multi-client
          docker push himesh2247/multi-server
          docker push himesh2247/multi-worker